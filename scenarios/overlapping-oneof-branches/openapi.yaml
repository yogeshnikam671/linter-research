openapi: 3.0.3
info:
  title: Overlapping oneOf Branches
  version: 1.0.0
paths:
  /tokens:
    post:
      operationId: createTokenOverlap
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: string
                  minLength: 1
                - type: string
                  pattern: "^[A-Za-z]+$"
      responses:
        "201":
          description: Created
