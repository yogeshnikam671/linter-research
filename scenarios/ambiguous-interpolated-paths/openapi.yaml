openapi: 3.0.3
info:
  title: Ambiguous Interpolated Paths
  version: 1.0.0
paths:
  /orders/{orderId}{trackingId}:
    get:
      operationId: getOrderByCombinedIds
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
        - name: trackingId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
