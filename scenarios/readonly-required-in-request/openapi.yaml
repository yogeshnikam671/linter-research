openapi: 3.0.3
info:
  title: readOnly Required In Request
  version: 1.0.0
paths:
  /users:
    post:
      operationId: createUserReadOnly
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id, name]
              properties:
                id:
                  type: string
                  readOnly: true
                name:
                  type: string
      responses:
        "201":
          description: Created
